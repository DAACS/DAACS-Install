services:
  shibboleth_real:
    expose:
      - 80
      - 443
    restart: unless-stopped
    networks:
      - myNetwork
    # env_file: 
    #   - ${ENV_DIR}shibboleth
    environment:
      - "VIRTUAL_HOST=${VIRTUAL_HOST}"
      - "SHIBBOLETH_CONTAINER_NAME=${SHIBBOLETH_CONTAINER_NAME}"
      - "ENTITY_ID=${ENTITY_ID}"
      - "SHIBBOLETH_SCOPE=${SHIBBOLETH_SCOPE}"
    # volumes:
    #   - "${FOLDER_START}:/usr/src/app"
    image: shibbolethreal

networks:
  myNetwork:
    external: true
