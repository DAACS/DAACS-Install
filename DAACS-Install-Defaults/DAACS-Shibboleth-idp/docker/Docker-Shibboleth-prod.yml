services:
  #shibboleth_service_name:
    expose:
      - 80
      - 443
    restart: unless-stopped
    networks:
      - myNetwork
    env_file: 
      - ${ENV_DIR}shibboleth
      - ${ENV_LDAP_DIR}ldap
    volumes:
      - "${ENV_LDAP_SSL_DIR}:/opt/shibboleth-idp/credentials/ldap/"
    image: shibbolethreal

networks:
  myNetwork:
    external: true
