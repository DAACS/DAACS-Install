services:

  idp:
    build:
      context: './'
    networks:
      - myNetwork
    expose:
      - 80
      - 443
      - 8080
    container_name: "idp5-moo"
    # volumes:
#      - ./data/ssl:/tmp/ssl:ro
    #  - "/home/moo/shibboleth-configs:/opt/shibboleth-idp/configs"
    #  - "/home/moo/shibboleth-metadata:/opt/shibboleth-idp/metadata"
    environment:
      - "VIRTUAL_HOST=${VIRTUAL_HOST}"
      - "VIRTUAL_PORT=8080"

networks:
  myNetwork:
    external: true



